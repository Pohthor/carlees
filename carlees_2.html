<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>كارليس — نظام إدارة تأجير السيارات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2224%22 fill=%22%232563eb%22/><path d=%22M24 62 L30 44 Q32 38 39 38 L61 38 Q68 38 70 44 L76 62 Z M22 62 L78 62 L78 72 Q78 76 74 76 L70 76 Q66 76 66 72 L66 70 L34 70 L34 72 Q34 76 30 76 L26 76 Q22 76 22 72 Z%22 fill=%22white%22/></svg>">
<style>
:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --border:#e6eaf0;
  --text:#0f172a;
  --muted:#64748b;
  --faint:#94a3b8;
  --primary:#2563eb;
  --primary-d:#1d4ed8;
  --primary-soft:#eff6ff;
  --green:#16a34a;--green-soft:#ecfdf5;
  --orange:#f97316;--orange-soft:#fff7ed;
  --amber:#d97706;--amber-soft:#fffbeb;
  --red:#ef4444;--red-soft:#fef2f2;
  --teal:#14b8a6;
  --r:16px;
  --sh:0 1px 2px rgba(15,23,42,.05);
  --sh-lg:0 18px 45px rgba(2,6,23,.16);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Sans Arabic',-apple-system,'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}
button{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
html,body{overflow-x:hidden;overflow-x:clip}
aside.sidebar{width:258px;flex-shrink:0;background:#fff;border-inline-end:1px solid var(--border);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;z-index:50}
.app.collapsed aside.sidebar{display:none}
main{flex:1;min-width:0;display:flex;flex-direction:column}
.content{padding:26px 26px 70px;width:100%;max-width:1180px;margin-inline:auto}

/* ===== Sidebar ===== */
.side-head{display:flex;gap:10px;align-items:center;padding:18px 16px 12px}
.logo-sq{width:38px;height:38px;border-radius:11px;background:var(--primary);color:#fff;display:grid;place-items:center;flex-shrink:0}
.side-title b{font-size:16.5px;font-weight:700;display:block;line-height:1.2}
.side-title span{display:block;font-size:10.5px;color:var(--muted);margin-top:2px}
nav#navRoot{flex:1;overflow-y:auto;padding:2px 10px 12px}
.nav-sec{font-size:10.5px;color:var(--faint);padding:15px 10px 5px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:8.5px 10px;border-radius:10px;font-size:13.5px;color:#475569;cursor:pointer;margin-bottom:2px;transition:background .15s,color .15s}
.nav-item svg{flex-shrink:0}
.nav-item:hover{background:#f1f5f9}
.nav-item.active{background:var(--primary-soft);color:var(--primary);font-weight:700}
.nbadge{margin-inline-start:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:99px;display:grid;place-items:center;padding:0 4px}
.side-foot{border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:9px;color:#475569;font-size:13px;cursor:pointer}
.side-foot:hover{color:var(--primary)}

/* ===== Topbar ===== */
.topbar{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);height:62px;display:flex;align-items:center;gap:14px;padding:0 20px}
.tb-title{display:flex;gap:11px;align-items:center;font-weight:700;font-size:15px;color:#1e293b;white-space:nowrap}
.tb-title .pn{cursor:pointer;color:#64748b;display:grid;place-items:center}
.tb-title .pn:hover{color:var(--primary)}
.tb-search{flex:1;max-width:430px;margin-inline:auto;position:relative}
.tb-search .sic{position:absolute;inset-inline-start:12px;top:50%;transform:translateY(-50%);color:var(--faint);pointer-events:none;display:grid}
.tb-search input{width:100%;height:38px;border:1px solid var(--border);border-radius:11px;background:#f8fafc;padding-inline:36px 14px;font:inherit;font-size:13px;outline:0;transition:border-color .15s, box-shadow .15s}
.tb-search input:focus{border-color:#bfdbfe;background:#fff;box-shadow:0 0 0 3px #dbeafe}
.search-pop{position:absolute;top:45px;inset-inline:0;background:#fff;border:1px solid var(--border);border-radius:13px;box-shadow:var(--sh-lg);overflow:hidden;display:none;z-index:80}
.search-pop.open{display:block}
.sp-row{display:flex;align-items:center;gap:10px;padding:10px 13px;font-size:13px;cursor:pointer}
.sp-row:hover{background:#f8fafc}
.sp-row .tag{margin-inline-start:auto;font-size:10.5px;color:var(--faint);background:#f1f5f9;border-radius:99px;padding:2px 8px}
.sp-empty{padding:14px;font-size:12.5px;color:var(--muted);text-align:center}
.tb-actions{display:flex;align-items:center;gap:10px;position:relative}
.icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--border);background:#fff;display:grid;place-items:center;color:#475569;cursor:pointer;position:relative;transition:.15s}
.icon-btn:hover{border-color:#cbd5e1;color:var(--text)}
.icon-btn .dot{position:absolute;top:-6px;inset-inline-end:-6px;background:var(--red);color:#fff;border-radius:99px;font-size:10px;font-weight:700;min-width:18px;height:18px;display:grid;place-items:center;border:2px solid #fff}
.avatar{width:38px;height:38px;border-radius:99px;background:#0f172a;color:#fff;display:grid;place-items:center;font-size:13px;font-weight:700;cursor:default}
.lang-btn{height:38px;border:1px solid var(--border);background:#fff;border-radius:11px;padding:0 12px;display:inline-flex;align-items:center;gap:7px;font:inherit;font-size:12.5px;font-weight:700;color:#334155;cursor:pointer}
.lang-btn:hover{border-color:#cbd5e1}

/* ===== Buttons / pills / inputs ===== */
.btn{height:38px;padding:0 15px;border-radius:11px;font:inherit;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:7px;cursor:pointer;border:0;transition:.15s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-d)}
.btn-ghost{background:#fff;border:1px solid var(--border);color:#334155}
.btn-ghost:hover{border-color:#cbd5e1;background:#f8fafc}
.btn-soft{background:var(--primary-soft);color:var(--primary)}
.btn-soft:hover{background:#dbeafe}
.btn-danger-soft{background:var(--red-soft);color:#dc2626}
.btn-danger-soft:hover{background:#fee2e2}
.btn-sm{height:31px;padding:0 11px;font-size:12px;border-radius:9px}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3.5px 10px;border-radius:99px;line-height:1}
.pill-blue{background:var(--primary);color:#fff}
.pill-gray{background:#fff;color:#64748b;border:1px solid var(--border)}
.pill-green{background:var(--green-soft);color:#15803d}
.pill-orange{background:var(--orange-soft);color:#c2410c}
.pill-amber{background:var(--amber-soft);color:#b45309}
.pill-red{background:var(--red-soft);color:#dc2626}
.pill-teal{background:#f0fdfa;color:#0f766e}
.inp{width:100%;height:40px;border:1px solid var(--border);border-radius:11px;padding:0 12px;font:inherit;font-size:13.5px;outline:0;background:#fff;color:var(--text);transition:border-color .15s, box-shadow .15s}
.inp:focus{border-color:#93c5fd;box-shadow:0 0 0 3px #dbeafe}
textarea.inp{height:auto;padding:10px 12px;resize:vertical}
select.inp{appearance:auto}
.lbl2{font-size:12px;font-weight:700;color:#475569;display:block;margin-bottom:6px}
.frow{margin-bottom:14px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hint{font-size:11.5px;color:var(--faint);margin-top:5px}

/* ===== Cards ===== */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh)}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 4px;font-weight:700;font-size:14.5px;gap:10px}
.card-h .hint-ic{color:var(--primary);display:grid}
.card-b{padding:12px 18px 18px}
.hero{margin-bottom:4px}
.hero h1{font-size:29px;font-weight:700;letter-spacing:-.3px}
.hero p{color:var(--muted);margin-top:4px;font-size:13.5px}
.page-h{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.page-h h2{font-size:20px;font-weight:700}
.page-h p{font-size:12.5px;color:var(--muted);margin-top:3px}

/* ===== Dashboard ===== */
.grid-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:22px}
.stat{padding:18px;background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh)}
.stat .top{display:flex;justify-content:space-between;align-items:flex-start}
.iconsq{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;flex-shrink:0}
.trend{font-size:11px;font-weight:700;background:#dcfce7;color:#15803d;padding:3px 9px;border-radius:99px}
.stat .lbl{color:var(--muted);font-size:12.5px;margin-top:13px}
.stat .val{font-size:23px;font-weight:700;margin-top:3px;letter-spacing:-.2px}
.grid-2{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-top:16px}
.leg{display:flex;align-items:center;gap:9px;font-size:13px;padding:5.5px 0;color:#334155}
.leg .ldot{width:9px;height:9px;border-radius:99px;flex-shrink:0}
.leg b{margin-inline-start:auto;font-weight:700}
.crow{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--border);border-radius:14px;margin-top:10px;cursor:pointer;transition:.15s;background:#fff}
.crow:hover{border-color:#bfdbfe;background:#fafcff}
.cavatar{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;flex-shrink:0}
.cmeta{min-width:0}
.cmeta b{font-size:13.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmeta span{font-size:11.5px;color:var(--muted);direction:ltr;display:inline-block}
.cend{margin-inline-start:auto;text-align:left;flex-shrink:0}
.cend b{display:block;font-size:14px;margin-bottom:5px}
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.qa{border:1px solid var(--border);border-radius:14px;padding:17px 8px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;font-size:12.5px;font-weight:600;color:#334155;background:#fff;transition:.15s}
.qa:hover{border-color:#bfdbfe;transform:translateY(-1px);box-shadow:0 6px 16px rgba(37,99,235,.08)}
.qa .iconsq{width:40px;height:40px;border-radius:11px}

/* ===== Tables / chips ===== */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:11.5px;color:var(--faint);text-align:start;padding:11px 10px;border-bottom:1px solid var(--border);font-weight:600;white-space:nowrap}
.tbl td{padding:12.5px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.tbl tr:last-child td{border-bottom:0}
.tbl tbody tr{transition:background .12s}
.tbl tbody tr:hover{background:#f8fafc}
.tbl .clickable{cursor:pointer}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:99px;border:1px solid var(--border);background:#fff;font-size:12.5px;cursor:pointer;font-weight:600;color:#475569;transition:.15s}
.chip:hover{border-color:#cbd5e1}
.chip.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.plate{direction:ltr;display:inline-flex;align-items:stretch;border:1.5px solid #cbd5e1;border-radius:7px;overflow:hidden;font-size:11px;font-weight:700;background:#fff}
.plate i{background:#f1f5f9;padding:2.5px 7px;font-style:normal;border-inline-start:1.5px solid #cbd5e1}
.plate b{padding:2.5px 8px;letter-spacing:1.5px}
.empty{padding:34px 14px;text-align:center;color:var(--muted);font-size:13px}
.banner{display:flex;gap:10px;align-items:flex-start;background:var(--primary-soft);border:1px solid #dbeafe;color:#1e40af;border-radius:13px;padding:12px 14px;font-size:12.5px;line-height:1.7;margin-bottom:16px}
.banner.amberish{background:var(--amber-soft);border-color:#fde68a;color:#92400e}

/* ===== Vehicles ===== */
.vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}
.vcard{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:11px}
.vtop{display:flex;justify-content:space-between;align-items:flex-start}
.vimg{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;font-size:26px}
.vname b{display:block;font-size:14.5px}
.vname span{font-size:11.5px;color:var(--muted)}
.vspecs{display:flex;gap:14px;font-size:12px;color:var(--muted);align-items:center;flex-wrap:wrap}
.vspecs .sp{display:inline-flex;align-items:center;gap:5px}
.vprice{font-weight:700;color:var(--primary);font-size:14px}
.vprice small{font-weight:500;color:var(--muted);font-size:11px}
.vrenter{font-size:12px;color:#334155;background:#f8fafc;border:1px dashed var(--border);border-radius:10px;padding:7px 10px}
.vbtns{display:flex;gap:8px;margin-top:2px}
.vbtns .btn{flex:1;justify-content:center}

/* ===== Kanban ===== */
.kwrap{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px;align-items:start}
.kcol{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px}
.kcol h4{display:flex;align-items:center;gap:8px;font-size:13.5px;margin-bottom:12px}
.kcol h4 .kc{margin-inline-start:auto;font-size:11px;background:#f1f5f9;border-radius:99px;padding:2px 9px;color:var(--muted)}
.kitem{border:1px solid var(--border);border-radius:12px;padding:11px;margin-bottom:9px;background:#fff}
.kitem b{font-size:13px;display:block;margin-bottom:4px}
.kitem .ksub{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.kitem .kact{margin-top:9px;display:flex;gap:7px}

/* ===== Tracking ===== */
.track-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;align-items:start}
.map-svg{width:100%;display:block;border-radius:13px}
.pulse{animation:pulse 1.8s ease-out infinite;transform-origin:center;transform-box:fill-box}
@keyframes pulse{0%{opacity:.7;transform:scale(.6)}70%{opacity:0;transform:scale(2.1)}100%{opacity:0;transform:scale(2.1)}}
.trow{display:flex;gap:11px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #f1f5f9}
.trow:last-child{border-bottom:0}
.trow .tdot{width:10px;height:10px;border-radius:99px;margin-top:5px;flex-shrink:0}
.trow b{font-size:13.5px;display:block}
.trow span{font-size:11.5px;color:var(--muted);display:block;margin-top:3px;line-height:1.6}

/* ===== Maintenance ===== */
.mitem{display:flex;gap:14px;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;align-items:flex-start}
.mbar{width:4px;border-radius:99px;align-self:stretch;flex-shrink:0}
.mmain{flex:1;min-width:0}
.mmain b{font-size:14px}
.mmain .msub{font-size:12px;color:var(--muted);margin-top:4px;display:flex;gap:13px;flex-wrap:wrap}
.mside{display:flex;flex-direction:column;align-items:flex-end;gap:9px;flex-shrink:0}

/* ===== Modal ===== */
.ovl{position:fixed;inset:0;background:rgba(2,6,23,.46);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:120;padding:18px;animation:fade .18s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:20px;width:100%;max-width:560px;max-height:92vh;overflow:auto;box-shadow:var(--sh-lg);animation:pop .2s ease}
.modal.wide{max-width:680px}
@keyframes pop{from{transform:translateY(10px) scale(.985);opacity:0}to{transform:none;opacity:1}}
.m-h{display:flex;justify-content:space-between;align-items:center;padding:17px 20px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;position:sticky;top:0;background:#fff;z-index:5;border-radius:20px 20px 0 0}
.m-x{width:32px;height:32px;border-radius:9px;border:0;background:#f1f5f9;color:#475569;display:grid;place-items:center;cursor:pointer}
.m-x:hover{background:#e2e8f0}
.m-b{padding:20px}
.m-f{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;position:sticky;bottom:0;background:#fff;border-radius:0 0 20px 20px}
.steps{display:flex;gap:6px;margin-bottom:20px}
.stp{flex:1;height:5px;border-radius:99px;background:#e2e8f0;transition:background .2s}
.stp.on{background:var(--primary)}
.selcard{border:1.5px solid var(--border);border-radius:13px;padding:12px 13px;cursor:pointer;transition:.13s;background:#fff;margin-bottom:9px}
.selcard:hover{border-color:#bfdbfe}
.selcard.on{border-color:var(--primary);background:var(--primary-soft)}
.selcard b{font-size:13.5px}
.selcard .ssub{font-size:11.5px;color:var(--muted);margin-top:3px}
.sumrow{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px dashed #e8edf3;color:#334155}
.sumrow:last-child{border-bottom:0}
.sumrow.tot{font-weight:700;font-size:14.5px;color:var(--text);border-top:1.5px solid var(--border);border-bottom:0;margin-top:4px;padding-top:12px}
.nafath-box{border:1.5px dashed #c7d6f5;border-radius:16px;padding:26px 16px;text-align:center;background:#fbfdff}
.nafath-num{font-size:34px;font-weight:700;color:var(--primary);letter-spacing:2px;margin:10px 0 4px}
.spinner{width:22px;height:22px;border:3px solid #dbeafe;border-top-color:var(--primary);border-radius:99px;animation:spin .8s linear infinite;margin:12px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.sigpad{border:1.5px dashed #cbd5e1;border-radius:14px;background:#fcfdff;display:block;touch-action:none;cursor:crosshair;width:100%}
.toggle-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #f1f5f9}
.toggle-row:last-child{border-bottom:0}
.toggle-row .tinfo{flex:1}
.toggle-row b{font-size:13.5px;display:block}
.toggle-row span{font-size:11.5px;color:var(--muted)}
.sw{width:40px;height:22px;border-radius:99px;background:#cbd5e1;position:relative;cursor:pointer;flex-shrink:0;transition:background .18s;border:0}
.sw::after{content:'';position:absolute;top:3px;inset-inline-start:3px;width:16px;height:16px;background:#fff;border-radius:99px;transition:transform .18s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.sw.on{background:var(--primary)}
.sw.on::after{transform:translateX(-18px)}
.sw.off-locked{opacity:.45;cursor:not-allowed}

/* ===== Invoice ===== */
.inv-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;padding-bottom:16px;border-bottom:1.5px solid var(--border);flex-wrap:wrap}
.inv-head .co b{font-size:15px}
.inv-head .co span{display:block;font-size:11.5px;color:var(--muted);margin-top:3px}
.inv-head .meta{text-align:left;font-size:11.5px;color:var(--muted);line-height:1.9}
.inv-head .meta b{display:block;font-size:13px;color:var(--text)}
.inv-foot{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;margin-top:18px;flex-wrap:wrap}
.qrbox{text-align:center}
.qrbox canvas{border:1px solid var(--border);border-radius:10px;padding:5px;background:#fff}
.qrbox span{display:block;font-size:10px;color:var(--faint);margin-top:6px;max-width:160px;line-height:1.6}

/* ===== Phone mock ===== */
.phone-wrap{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
.phone{width:296px;height:600px;border:9px solid #0f172a;border-radius:40px;background:#f6f8fb;overflow:hidden;flex-shrink:0;box-shadow:0 24px 60px rgba(2,6,23,.18);position:relative}
.phone .notch{position:absolute;top:9px;left:50%;transform:translateX(-50%);width:96px;height:20px;background:#0f172a;border-radius:99px;z-index:3}
.pscr{height:100%;overflow:auto;padding:46px 16px 20px}
.pcard{background:#fff;border:1px solid var(--border);border-radius:15px;padding:14px;margin-bottom:11px}

/* ===== Toast ===== */
#toastRoot{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:9px;align-items:center}
.toast{background:#0f172a;color:#fff;padding:11px 17px;border-radius:13px;font-size:13px;display:flex;gap:9px;align-items:center;box-shadow:0 14px 34px rgba(2,6,23,.3);animation:toastIn .25s ease}
.toast.ok svg{color:#4ade80}
@keyframes toastIn{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}

/* ===== Dropdown menus ===== */
.menu{position:absolute;top:46px;inset-inline-end:0;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--sh-lg);min-width:225px;padding:7px;z-index:90;display:none}
.menu.open{display:block;animation:pop .15s ease}
.menu .mi{display:flex;gap:10px;align-items:center;padding:9.5px 11px;border-radius:10px;font-size:13px;cursor:pointer;color:#334155}
.menu .mi:hover{background:#f4f7fb}
.menu .mi b{font-size:12.5px}
.menu .mi span{display:block;font-size:11px;color:var(--muted);margin-top:2px}
.menu .mhead{font-size:11px;color:var(--faint);font-weight:700;padding:6px 11px 4px}

/* ===== Inspection ===== */
.insp-grid{display:grid;grid-template-columns:215px 1fr;gap:18px}
.insp-tools{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.tooltag{padding:6px 12px;border-radius:99px;border:1.5px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;background:#fff;display:inline-flex;align-items:center;gap:6px}
.tooltag .tdot2{width:8px;height:8px;border-radius:99px}
.tooltag.on{border-color:var(--text);background:#0f172a;color:#fff}
.marklist{max-height:150px;overflow:auto;margin-top:8px}
.markrow{display:flex;align-items:center;gap:9px;font-size:12px;padding:6px 8px;border:1px solid #f1f5f9;border-radius:9px;margin-bottom:6px;background:#fbfcfe}
.markrow .del{margin-inline-start:auto;cursor:pointer;color:var(--faint);display:grid}
.markrow .del:hover{color:var(--red)}


/* ===== Inspection page ===== */
.igrid{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:stretch}
.ipanel{border:1px solid var(--border);border-radius:14px;background:#fff;display:flex;flex-direction:column}
.ipanel .ptitle{padding:13px 16px 0;font-size:13px;font-weight:700;color:#334155;text-align:center}
.ipanel .pbody{flex:1;display:flex;align-items:center;justify-content:center;padding:18px}
.tooltag.on2{border-color:var(--primary);box-shadow:0 0 0 3px #dbeafe;color:var(--primary)}
.upbox{border:1.5px dashed #cbd5e1;border-radius:13px;padding:22px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted);font-size:12.5px;cursor:pointer;transition:.15s;background:#fbfcfe}
.upbox:hover{border-color:#93c5fd;color:var(--primary)}
.phgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:10px;margin-top:12px}
.phitem{position:relative;border-radius:11px;overflow:hidden;border:1px solid var(--border);aspect-ratio:1}
.phitem img{width:100%;height:100%;object-fit:cover;display:block}
.phitem .phx{position:absolute;top:5px;inset-inline-end:5px;width:20px;height:20px;border-radius:99px;background:rgba(15,23,42,.72);color:#fff;display:grid;place-items:center;cursor:pointer}
@media (max-width:900px){.igrid{grid-template-columns:1fr}}

/* ===== Charts ===== */
.chart-ltr{direction:ltr}

/* ===== KPI mini ===== */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px}
.kpi .klbl{font-size:12px;color:var(--muted)}
.kpi .kval{font-size:21px;font-weight:700;margin-top:6px}
.kpi .ksub2{font-size:11px;color:var(--faint);margin-top:4px}

/* ===== Print (invoice only) ===== */
@media print{
  body *{visibility:hidden}
  .modal.invoice, .modal.invoice *{visibility:visible}
  .ovl{position:absolute;inset:0;background:#fff;padding:0;backdrop-filter:none}
  .modal.invoice{box-shadow:none;max-width:100%;max-height:none;border-radius:0}
  .m-f,.m-x{display:none !important}
}

/* ===== Responsive ===== */
@media (max-width:1100px){
  .grid-stats{grid-template-columns:1fr 1fr}
  .vgrid{grid-template-columns:1fr 1fr}
  .grid-2,.track-grid{grid-template-columns:1fr}
}
/* ===== Mobile: drawer + scrim ===== */
.scrim{display:none}
@media (max-width:860px){
  aside.sidebar{position:fixed;inset-inline-start:auto;inset-inline-end:0;top:0;height:100vh;height:100dvh;width:min(82vw,302px);
    box-shadow:-18px 0 50px rgba(2,6,23,.18);transform:translateX(102%);visibility:hidden;
    transition:transform .32s cubic-bezier(.32,.9,.35,1), visibility 0s .32s;
    display:flex;overflow-y:auto;z-index:130;border-inline-end:none;border-inline-start:1px solid var(--border)}
  .app.sideopen aside.sidebar{transform:translateX(0);visibility:visible;transition:transform .32s cubic-bezier(.32,.9,.35,1)}
  .app.collapsed aside.sidebar{display:flex}
  .scrim{display:block;position:fixed;inset:0;background:rgba(2,6,23,.42);backdrop-filter:blur(3px);
    opacity:0;pointer-events:none;transition:opacity .28s;z-index:125}
  .app.sideopen .scrim{opacity:1;pointer-events:auto}
  .tb-search{max-width:none}
  .kbd{display:none}
  .nav-item{padding:11.5px 12px;font-size:14px}
  .nav-item:hover{transform:none}

  .content{padding-bottom:108px}
  #toastRoot{bottom:calc(78px + env(safe-area-inset-bottom));width:calc(100% - 28px)}
  .toast{width:100%;justify-content:flex-start}
  .menu{max-width:calc(100vw - 26px)}

}

/* ===== Mobile: bottom navigation ===== */
.bnav{display:none}
@media (max-width:860px){
  .bnav{position:fixed;bottom:0;left:0;right:0;z-index:95;display:grid;grid-template-columns:1fr 1fr 70px 1fr 1fr;
    align-items:center;height:calc(62px + env(safe-area-inset-bottom));padding:0 6px env(safe-area-inset-bottom);
    background:rgba(255,255,255,.93);backdrop-filter:blur(16px) saturate(1.5);border-top:1px solid var(--border)}
  .bni{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:600;color:#64748b;

  .bni.on{color:var(--primary)}

  .bfab{width:56px;height:56px;border-radius:99px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;
    display:grid;place-items:center;margin:0 auto;transform:translateY(-16px);cursor:pointer;
    box-shadow:0 8px 22px -6px rgba(37,99,235,.65), 0 0 0 5px rgba(241,245,249,.95);transition:transform .15s, filter .15s}

  .bfab:hover{filter:brightness(1.07)}
}

/* ===== Mobile: compact layout ===== */
@media (max-width:640px){
  .grid-stats{grid-template-columns:1fr 1fr;gap:11px}
  .stat{padding:13px}
  .stat .val{font-size:19px}
  .spark{width:100%;height:26px}
  .vgrid,.kwrap,.kpis,.f2{grid-template-columns:1fr}
  .content{padding:16px 13px 112px}
  .hero h1{font-size:22px}
  .topbar{padding-inline:10px;gap:7px}
  .hide-sm{display:none}
  .lang-btn{display:none}
  .icon-btn{width:36px;height:36px}

  #viewTitle{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;display:block}
  .tb-search{min-width:0}
  .tb-search input{min-width:0;width:100%}
  .inp, select.inp, textarea.inp, .tb-search input{font-size:16px}
  .tbl{min-width:580px}
  .card-h{flex-wrap:wrap;gap:8px}
  .page-h{flex-wrap:wrap;gap:10px}
  #c3d{height:330px!important}
  .pbody{padding:12px}
  .m-f{flex-wrap:wrap}
  .m-f .btn{flex:1 1 auto;justify-content:center}
}

/* ===== Overflow safety ===== */
main, .content, .card, .card-b{min-width:0}
.card-b:has(> .tbl){overflow-x:auto;-webkit-overflow-scrolling:touch}
@media (max-width:640px){ .tbl{min-width:540px} }

/* ===== Mobile: bottom-sheet modals ===== */
@media (max-width:640px){
  .ovl{align-items:flex-end;padding:0}

  .modal::before{content:'';display:block;width:44px;height:5px;border-radius:99px;background:#e2e8f0;margin:10px auto 2px}
  @keyframes sheetUp{from{transform:translateY(70px);opacity:.55}to{transform:none;opacity:1}}
}

/* ===== Polish v2 ===== */
*:focus-visible{outline:2px solid #93c5fd;outline-offset:2px}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px;border:2px solid #f1f5f9}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}
body{background:radial-gradient(1000px 420px at 80% -10%, rgba(59,130,246,.07), transparent 60%), var(--bg)}

.nav-item{position:relative;transition:background .15s, color .15s, transform .15s}
.nav-item:hover{transform:translateX(-2px)}
.nav-item.active::before{content:'';position:absolute;inset-inline-start:-12px;top:7px;bottom:7px;width:3.5px;border-radius:99px;background:var(--primary)}
.topbar{backdrop-filter:blur(14px) saturate(1.4)}
.tb-search input{transition:box-shadow .18s, border-color .18s}
.tb-search input:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(59,130,246,.12)}
.kbd{position:absolute;inset-inline-end:11px;top:50%;transform:translateY(-50%);font-size:10.5px;color:#94a3b8;border:1px solid var(--border);border-bottom-width:2px;border-radius:6px;padding:1px 7px;background:#fff;pointer-events:none;line-height:1.5}
.tb-search input:focus ~ .kbd{display:none}
.avatar{background:linear-gradient(135deg,#334155,#0f172a);box-shadow:0 0 0 2px #fff, 0 0 0 4px #dbeafe}
.toast{border-inline-start:3px solid #64748b}
.toast.ok{border-inline-start-color:#4ade80}

.ovl{backdrop-filter:blur(7px) saturate(1.15)}
.modal{animation:mpop .3s cubic-bezier(.34,1.45,.64,1)}
@keyframes mpop{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:none}}
.tbl tbody tr{transition:background .12s}
.tbl tbody tr:hover{background:#f8fafc}
.chip:hover{border-color:#bfdbfe;color:var(--primary)}
.crow:hover{transform:translateY(-1px);box-shadow:0 8px 20px -12px rgba(37,99,235,.25)}
.vcard{transition:transform .18s, box-shadow .18s, border-color .18s}
.vcard:hover{transform:translateY(-3px);border-color:#bfdbfe;box-shadow:0 18px 34px -20px rgba(37,99,235,.3)}
.selcard{transition:transform .15s, box-shadow .15s, border-color .15s, background .15s}
.selcard:hover{transform:translateY(-1px)}
#view.venter > *{animation:vup .45s cubic-bezier(.22,.9,.36,1) both}
#view.venter > *:nth-child(2){animation-delay:.05s}
#view.venter > *:nth-child(3){animation-delay:.1s}
#view.venter > *:nth-child(4){animation-delay:.15s}

@keyframes vup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){
  #view.venter > *, .modal, .lcline{animation:none!important}

}
.lcline{stroke-dasharray:1400;stroke-dashoffset:1400;animation:lcdash 1.2s .15s ease-out forwards}
@keyframes lcdash{to{stroke-dashoffset:0}}
.lctip{position:absolute;display:none;flex-direction:column;align-items:center;gap:1px;background:#0f172a;color:#fff;border-radius:10px;padding:6px 11px;font-size:11.5px;transform:translate(-50%,-130%);pointer-events:none;white-space:nowrap;box-shadow:0 10px 24px rgba(2,6,23,.35);z-index:5}

.scan-drop{border:1.5px dashed #bfdbfe;border-radius:14px;padding:20px 14px;display:flex;flex-direction:column;align-items:center;gap:9px;background:linear-gradient(180deg,#f8fbff,#fff);text-align:center;cursor:pointer;transition:.16s}

.field-pop{animation:fpop .45s ease}
@keyframes fpop{0%{background:#ecfdf5}100%{background:transparent}}
.tpl-row{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 14px}

.qbtn:hover{border-color:#bfdbfe;background:#f1f7ff}

.qr-actions .btn{justify-content:flex-start}
@media (max-width:640px){ .scan-stage{aspect-ratio:1.4}; .qr-actions{grid-template-columns:1fr} }
</style>

/* ================= CHARTS (SVG) ================= */
let LCD=null;
function lineChart(vals, labels, w=560, h=250){
  const pad={l:48,r:18,t:14,b:30}, max=60000;
  const X=i=> pad.l + (w-pad.l-pad.r)*i/(vals.length-1);
  const Y=v=> pad.t + (h-pad.t-pad.b)*(1-v/max);
  LCD={vals, labels, Xs:vals.map((_,i)=>X(i)), Ys:vals.map(v=>Y(v)), w, h};
  const ticks=[0,15000,30000,45000,60000];
  let g='';
  ticks.forEach(t=>{ g+=`<line x1="${pad.l}" y1="${Y(t)}" x2="${w-pad.r}" y2="${Y(t)}" stroke="#eef2f7"/>
    <text x="${pad.l-8}" y="${Y(t)+4}" font-size="11" fill="#94a3b8" text-anchor="end">${t===0?'0':fmt(t)}</text>`; });
  labels.forEach((m,i)=>{ g+=`<text x="${X(i)}" y="${h-8}" font-size="11.5" fill="#94a3b8" text-anchor="middle">${m}</text>`; });
  const path = vals.map((v,i)=>`${i?'L':'M'}${X(i)},${Y(v)}`).join(' ');
  const area = path + ` L${X(vals.length-1)},${h-pad.b} L${X(0)},${h-pad.b} Z`;
  const dots = vals.map((v,i)=>{
    const col = i===vals.length-1 ? '#14b8a6' : '#f97316';
    return `<circle cx="${X(i)}" cy="${Y(v)}" r="5" fill="${col}" stroke="#fff" stroke-width="2.5"/>`;
  }).join('');
  return `<div class="chart-ltr lc-wrap" style="position:relative"><svg viewBox="0 0 ${w} ${h}" style="width:100%;display:block;overflow:visible">
    <defs>
      <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#f97316"/><stop offset="60%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#14b8a6"/>
      </linearGradient>
      <linearGradient id="lgA" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#f59e0b" stop-opacity=".16"/><stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${g}
    <path d="${area}" fill="url(#lgA)"/>
    <path class="lcline" d="${path}" fill="none" stroke="url(#lg1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line class="lcguide" y1="${pad.t}" y2="${h-pad.b}" stroke="#cbd5e1" stroke-dasharray="4 4" style="display:none"/>
    ${dots}
    <rect x="0" y="0" width="${w}" height="${h}" fill="transparent" onmousemove="lcMove(event)" onmouseleave="lcOut(event)"/>
  </svg><div class="lctip"></div></div>`;
}
function lcMove(e){
  if(!LCD) return;
  const svg=e.currentTarget.ownerSVGElement, wrap=svg.parentElement, r=svg.getBoundingClientRect();
  const vx=(e.clientX-r.left)*(LCD.w/r.width);
  let bi=0, bd=1e9;
  LCD.Xs.forEach((x,i)=>{ const d=Math.abs(x-vx); if(d<bd){bd=d;bi=i;} });
  const gl=svg.querySelector('.lcguide');
  gl.style.display='block'; gl.setAttribute('x1',LCD.Xs[bi]); gl.setAttribute('x2',LCD.Xs[bi]);

  wrap.querySelector('.lctip').style.display='none';

function donut(segs, size=176, stroke=32, center=null){
  const r=(size-stroke)/2 - 2, cx=size/2, cy=size/2, CIRC=2*Math.PI*r;
  const total=segs.reduce((a,s)=>a+s.v,0)||1;
  const gap=CIRC*0.022;
  let off=0, out='';
  segs.forEach(s=>{
    const len=CIRC*s.v/total;
    out+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${stroke}"
      stroke-dasharray="${Math.max(len-gap,2)} ${CIRC-Math.max(len-gap,2)}" stroke-dashoffset="${-off}" stroke-linecap="butt"/>`;
    off+=len;
  });
  const ct = center ? `
    <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="${Math.round(size*.15)}" font-weight="700" fill="#0f172a" style="font-variant-numeric:tabular-nums">${center.b}</text>
    <text x="${cx}" y="${cy+Math.round(size*.105)}" text-anchor="middle" font-size="10.5" fill="#94a3b8">${center.s}</text>` : '';
  return `<div class="chart-ltr" style="display:flex;justify-content:center"><svg viewBox="0 0 ${size} ${size}" style="width:${size}px;max-width:100%">
    <g transform="rotate(-90 ${cx} ${cy})">${out}</g>${ct}</svg></div>`;
}
function barChart(vals, labels, w=560, h=230, color='#2563eb'){
  const pad={l:48,r:14,t:14,b:30}, max=60000;
  const iw=(w-pad.l-pad.r)/vals.length;
  const Y=v=> pad.t + (h-pad.t-pad.b)*(1-v/max);
  let g='';
  [0,15000,30000,45000,60000].forEach(t=>{ g+=`<line x1="${pad.l}" y1="${Y(t)}" x2="${w-pad.r}" y2="${Y(t)}" stroke="#eef2f7"/>
    <text x="${pad.l-8}" y="${Y(t)+4}" font-size="11" fill="#94a3b8" text-anchor="end">${t===0?'0':fmt(t)}</text>`; });
  vals.forEach((v,i)=>{
    const bw=Math.min(iw*0.5, 42), x=pad.l+iw*i+(iw-bw)/2, y=Y(v);
    g+=`<rect x="${x}" y="${y}" width="${bw}" height="${h-pad.b-y}" rx="7" fill="${color}" opacity="${0.55+0.45*i/(vals.length-1)}"/>
        <text x="${pad.l+iw*i+iw/2}" y="${h-8}" font-size="11.5" fill="#94a3b8" text-anchor="middle">${labels[i]}</text>`;
  });
  return `<div class="chart-ltr"><svg viewBox="0 0 ${w} ${h}" style="width:100%;display:block">${g}</svg></div>`;
}
function pseudoQR(canvas, seed, size){
  if(size){ canvas.width=size; canvas.height=size; }
  const n=25, px=canvas.width/n, ctx=canvas.getContext('2d');
  let h=2166136261;
  for(const ch of seed){ h^=ch.charCodeAt(0); h=Math.imul(h,16777619); }
  const rnd=()=>{ h^=h<<13; h^=h>>>17; h^=h<<5; return ((h>>>0)/4294967295); };
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0f172a';
  const finder=(fx,fy)=>{
    ctx.fillRect(fx*px,fy*px,7*px,7*px);
    ctx.fillStyle='#fff'; ctx.fillRect((fx+1)*px,(fy+1)*px,5*px,5*px);
    ctx.fillStyle='#0f172a'; ctx.fillRect((fx+2)*px,(fy+2)*px,3*px,3*px);
  };
  for(let r=0;r<n;r++) for(let c=0;c<n;c++){
    const inF=(r<8&&c<8)||(r<8&&c>=n-8)||(r>=n-8&&c<8);
    if(!inF && rnd()>0.52) ctx.fillRect(c*px,r*px,px,px);
  }
  finder(0,0); finder(n-7,0); finder(0,n-7);
}

function spark(vals, color){
  const w=112, h=30, mx=Math.max(...vals), mn=Math.min(...vals);
  const X=i=> 3 + (w-6)*i/(vals.length-1);
  const Y=v=> 4 + (h-9)*(1-(v-mn)/((mx-mn)||1));
  const p=vals.map((v,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}">
    <path d="${p} L${X(vals.length-1).toFixed(1)},${h-2} L3,${h-2} Z" fill="${color}" opacity=".09"/>
    <path d="${p}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${X(vals.length-1).toFixed(1)}" cy="${Y(vals[vals.length-1]).toFixed(1)}" r="2.7" fill="${color}" stroke="#fff" stroke-width="1.4"/></svg>`;
}

}
function countUps(){
  document.querySelectorAll('.cnt').forEach(el=>{
    const target=+el.dataset.v||0, t0=performance.now(), D=800;
    const step=t=>{
      const k=Math.min(1,(t-t0)/D), e=1-Math.pow(1-k,3);
      el.textContent=fmt(Math.round(target*e));
      if(k<1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  });
}

  const rows = state.bookings.map(b=>{

        <span class="pill ${BST[b.status]}">${b.status}</span>
        ${open?`<button class="btn btn-primary btn-sm" onclick="convertBooking('${b.id}')">تحويل لعقد</button>
                <button class="btn btn-danger-soft btn-sm" onclick="cancelBooking('${b.id}')">إلغاء</button>`:''}
      </div>
    </div>`;
  }).join('');
  return `
    <div class="page-h">
      <div class="hint" style="margin:0">تحويل الحجز لعقد ينشئ العقد والفاتورة تلقائيًا ويحجز السيارة</div>
      <button class="btn btn-primary" onclick="openAddBooking()">${ic('plus',15)} حجز جديد</button>
    </div>

function convertBooking(id){
  const b=state.bookings.find(x=>x.id===id);
  const v=V(b.veh), c=C(b.cust);
  if(v.status!=='available'){ toast(`${v.ar} غير متاحة حاليًا — عدّل الحجز أولًا`, false); return; }
  const nid='CT-'+(state.seq++);
  const total=b.days*v.daily;
  state.contracts.push({id:nid, cust:b.cust, veh:b.veh, from:b.from, days:b.days, daily:v.daily, total, status:'active', signed:false, sig:null, nafath:c.nafath});
  v.status='rented'; v.renter=b.cust;
  c.rentals++; c.spend+=total;
  state.payments.unshift({date:today(), ref:nid, cust:b.cust, method:'مدى', amount:total});
  b.status='محوّل لعقد';
  refreshBadges();
  toast(`تم تحويل ${b.id} إلى العقد ${nid}`);
  render();
  setTimeout(()=>openInvoice(nid), 400);
}
function cancelBooking(id){
  const b=state.bookings.find(x=>x.id===id);
  b.status='ملغي'; refreshBadges(); toast('تم إلغاء الحجز'); render();
}

/* ================= SIGNATURE PAD ================= */
function initSig(canvas, onFirst){
  const ratio=2, w=canvas.clientWidth||460, h=160;
  canvas.width=w*ratio; canvas.height=h*ratio; canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d'); ctx.scale(ratio,ratio);
  ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#1e293b';
  let draw=false, started=false;
  const pos=e=>{const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top};};
  canvas.addEventListener('pointerdown',e=>{
    e.preventDefault(); draw=true; canvas.setPointerCapture(e.pointerId);
    const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x+0.1,p.y+0.1); ctx.stroke();
    if(!started){started=true; onFirst&&onFirst();}
  });
  canvas.addEventListener('pointermove',e=>{ if(!draw)return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>canvas.addEventListener(ev,()=>draw=false));
  return {
    clear(){ ctx.clearRect(0,0,w,h); started=false; },
    data(){ return canvas.toDataURL('image/png'); }
  };
}

/* ================= 3D VIEW (three.js) ================= */
let T3=null;
function init3D(){
  const el=$('#c3d'); if(!el) return;
  if(typeof THREE==='undefined'){
    el.innerHTML='<div class="empty">تعذّر تحميل محرك العرض ثلاثي الأبعاد — تأكد من اتصال الإنترنت ثم أعد فتح الصفحة.</div>';
    return;
  }
  const w=el.clientWidth||600, h=el.clientHeight||430;
  const scene=new THREE.Scene(); scene.background=new THREE.Color(0xfbfdff);
  const cam=new THREE.PerspectiveCamera(40, w/h, 0.1, 100);
  const ren=new THREE.WebGLRenderer({antialias:true});
  ren.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
  ren.setSize(w,h);
  el.innerHTML=''; el.appendChild(ren.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const dl=new THREE.DirectionalLight(0xffffff, 0.65); dl.position.set(4,7,3); scene.add(dl);

  const ground=new THREE.Mesh(new THREE.CircleGeometry(4.6,48), new THREE.MeshBasicMaterial({color:0xeef2f7}));
  ground.rotation.x=-Math.PI/2; scene.add(ground);

  const car=new THREE.Group();
  const bodyMat=new THREE.MeshStandardMaterial({color:0xffffff, roughness:.55, metalness:.08});
  const glassMat=new THREE.MeshStandardMaterial({color:0xbfdbfe, roughness:.2, metalness:.1, transparent:true, opacity:.85});
  const mirMat=new THREE.MeshStandardMaterial({color:0xf59e0b, roughness:.5});
  const whMat=new THREE.MeshStandardMaterial({color:0x334155, roughness:.85});
  const add=(geo,mat,x,y,z,rx=0,ry=0,rz=0,withEdge=false)=>{
    const m=new THREE.Mesh(geo,mat); m.position.set(x,y,z); m.rotation.set(rx,ry,rz); car.add(m);
    if(withEdge){
      const e=new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({color:0x3b82f6}));
      e.position.copy(m.position); e.rotation.copy(m.rotation); car.add(e);
    }
    return m;
  };
  add(new THREE.BoxGeometry(1.9,.6,4.5),  bodyMat, 0,.62,0,    0,0,0, true);   // الهيكل
  add(new THREE.BoxGeometry(1.7,.52,2.2), bodyMat, 0,1.16,-.15,0,0,0, true);   // المقصورة
  add(new THREE.BoxGeometry(1.55,.5,.06), glassMat,0,1.14,1.02,-0.45,0,0);     // زجاج أمامي
  add(new THREE.BoxGeometry(1.55,.46,.06),glassMat,0,1.14,-1.3, 0.5,0,0);      // زجاج خلفي
  add(new THREE.BoxGeometry(.05,.38,1.85),glassMat, .86,1.18,-.15);            // نوافذ جانبية
  add(new THREE.BoxGeometry(.05,.38,1.85),glassMat,-.86,1.18,-.15);
  add(new THREE.BoxGeometry(.3,.12,.18),  mirMat,  1.05,1.0,.95);              // مرايا
  add(new THREE.BoxGeometry(.3,.12,.18),  mirMat, -1.05,1.0,.95);
  const wg=new THREE.CylinderGeometry(.38,.38,.28,24);
  [[.95,1.45],[-.95,1.45],[.95,-1.45],[-.95,-1.45]].forEach(([x,z])=>add(wg,whMat,x,.38,z,0,0,Math.PI/2));
  scene.add(car);

  const markersG=new THREE.Group(); scene.add(markersG);
  T3={scene, cam, ren, car, markersG, yaw:0.85, pitch:0.42, dist:7.4};
  paint3DMarks();

  const cv=ren.domElement;
  cv.style.touchAction='none'; cv.style.cursor='grab'; cv.style.display='block';
  let dragging=false, moved=0, lx=0, ly=0;
  cv.addEventListener('pointerdown', e=>{ dragging=true; moved=0; lx=e.clientX; ly=e.clientY; cv.setPointerCapture(e.pointerId); cv.style.cursor='grabbing'; });
  cv.addEventListener('pointermove', e=>{
    if(!dragging) return;
    const dx=e.clientX-lx, dy=e.clientY-ly; lx=e.clientX; ly=e.clientY;
    moved += Math.abs(dx)+Math.abs(dy);
    T3.yaw   -= dx*0.008;
    T3.pitch  = Math.min(1.25, Math.max(0.08, T3.pitch + dy*0.006));
  });
  cv.addEventListener('pointerup', e=>{
    dragging=false; cv.style.cursor='grab';
    if(moved<6){
      const r=cv.getBoundingClientRect();
      const m=new THREE.Vector2(((e.clientX-r.left)/r.width)*2-1, -((e.clientY-r.top)/r.height)*2+1);
      const rc=new THREE.Raycaster(); rc.setFromCamera(m, T3.cam);
      const hits=rc.intersectObjects(T3.car.children.filter(o=>o.isMesh), false);
      if(hits.length){
        const p=hits[0].point;
        IP.marks.push({view:'3d', p:{x:p.x, y:p.y, z:p.z}, tool:IP.tool});
        paintInspMarks();
      }
    }
  });
  cv.addEventListener('wheel', e=>{ e.preventDefault(); T3.dist=Math.min(13, Math.max(3.5, T3.dist + e.deltaY*0.004)); }, {passive:false});

  (function loop(){
    if(!document.body.contains(cv)){ ren.dispose(); T3=null; return; }
    cam.position.set(
      Math.sin(T3.yaw)*Math.cos(T3.pitch)*T3.dist,
      Math.sin(T3.pitch)*T3.dist + 0.5,
      Math.cos(T3.yaw)*Math.cos(T3.pitch)*T3.dist
    );
    cam.lookAt(0, 0.6, 0);
    ren.render(scene, cam);
    requestAnimationFrame(loop);
  })();
}
function markSprite(n, color){
  const c=document.createElement('canvas'); c.width=c.height=96;
  const x=c.getContext('2d');
  x.beginPath(); x.arc(48,48,38,0,Math.PI*2); x.fillStyle=color; x.fill();
  x.lineWidth=8; x.strokeStyle='#fff'; x.stroke();
  x.fillStyle='#fff'; x.font='700 42px Arial'; x.textAlign='center'; x.textBaseline='middle'; x.fillText(n,48,51);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c), depthTest:false}));
  sp.scale.set(.34,.34,1);
  return sp;
}
function paint3DMarks(){
  if(!T3) return;
  while(T3.markersG.children.length) T3.markersG.remove(T3.markersG.children[0]);
  IP.marks.forEach((m,i)=>{
    if(m.view!=='3d') return;
    const sp=markSprite(String(i+1), tcol(m.tool));
    sp.position.set(m.p.x, m.p.y, m.p.z);
    T3.markersG.add(sp);
  });
}

function custScore(c){
  if(!c || !c.net || (!c.net.r && !c.net.off)) return null;
  let s = 70 + Math.min(c.net.r,12)*2 - c.net.late*8 - c.net.dmg*12 - c.net.viol*4;
  if(c.net.r < 3) s = Math.min(s, 80);
  return Math.max(12, Math.min(97, s));
}
function tierOf(s){
  if(s===null) return {t:'لا سجل',          c:'#94a3b8', bg:'#f1f5f9'};
  if(s>=85)    return {t:'ممتاز',           c:'#16a34a', bg:'#ecfdf5'};
  if(s>=70)    return {t:'جيد',             c:'#2563eb', bg:'#eff6ff'};
  if(s>=55)    return {t:'متوسط',           c:'#d97706', bg:'#fffbeb'};
  return            {t:'مرتفع الخطورة',   c:'#dc2626', bg:'#fef2f2'};
}
function wzDeposit(){
  const s=custScore(C(W.cust));
  return s!==null && s<55 ? 1500 : s!==null && s<70 ? 1000 : state.settings.deposit;
}
function scoreRing(s, size=58){
  const tier=tierOf(s), r=(size-9)/2, C2=2*Math.PI*r, k=(s===null?0:s)/100;
  return `<svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;flex-shrink:0">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#eef2f7" stroke-width="6.5"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${tier.c}" stroke-width="6.5" stroke-linecap="round"
      stroke-dasharray="${(C2*k).toFixed(1)} ${C2.toFixed(1)}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-size="${Math.round(size*.3)}" font-weight="800" fill="${tier.c}">${s===null?'—':s}</text>
  </svg>`;
}

let W={}, wzSig=null;
const PRICE_TPL=[
  {id:'std',  t:'اليومي العادي', mult:1,    disc:0,   note:'بدون تعديل'},
  {id:'wk',   t:'أسبوعي',        days:7,    disc:0.12,note:'خصم 12٪'},
  {id:'we',   t:'نهاية الأسبوع', days:3,    disc:0.05,note:'3 أيام · خصم 5٪'},
  {id:'mo',   t:'شهري',          days:30,   disc:0.22,note:'خصم 22٪'},
];
let wzTpl='std';

function openWizard(){
  W={step:1, cust:null, veh:null, from:today(), days:3, disc:0, nnum:10+Math.floor(Math.random()*90), nafathOk:false, nafathBusy:false, quickAdd:false}; wzTpl='std';

}
const WZ_T={1:'اختيار العميل',2:'السيارة والمدة',3:'التسعير والملخص',4:'التحقق عبر نفاذ',5:'توقيع العقد'};
function wzCalc(){
  const v=V(W.veh); if(!v) return {base:0,sub:0,vat:0,tot:0};
  const base=W.days*v.daily, sub=Math.max(0, base-(+W.disc||0));
  return {base, sub, vat:sub*.15, tot:sub*1.15};
}

          </div>
        </div>
      </div>`).join('')
      + (W.quickAdd ? `
      <div class="card" style="padding:14px;margin-top:6px;box-shadow:none;border:1.5px dashed #bfdbfe">
        <div class="f2">
          <div><label class="lbl2">اسم العميل</label><input class="inp" id="qaName" placeholder="مثال: فهد الدوسري"></div>

    body += wzRiskNote();
  }

  if(W.step===2){
    const avail=state.vehicles.filter(v=>v.status==='available');

    body = `
      ${avail.length? avail.map(v=>`

          </div>
        </div>`).join('') : '<div class="empty">لا سيارات متاحة حاليًا — أنهِ عقدًا أو أضف سيارة</div>'}

        <div class="sumrow"><span>خصم</span><span style="width:120px"><input class="inp" style="height:34px;text-align:center" type="number" min="0" value="${W.disc}" oninput="W.disc=+this.value||0;wzLive()"></span></div>
        <div class="sumrow"><span>الخاضع للضريبة</span><b id="wzSub">${fmt2(k.sub)} ر.س</b></div>
        <div class="sumrow"><span>ضريبة القيمة المضافة (15٪)</span><b id="wzVat">${fmt2(k.vat)} ر.س</b></div>
        <div class="sumrow tot"><span>الإجمالي شامل الضريبة</span><b id="wzTot" style="color:var(--primary)">${fmt2(k.tot)} ر.س</b></div>
        ${(()=>{const sc=custScore(c), dep=wzDeposit(), up=dep>state.settings.deposit;
          return `<div class="sumrow"><span>تأمين مسترد (يُحصّل عند الاستلام)</span><b style="${up?'color:#dc2626':''}">${fmt(dep)} ر.س</b></div>`
            + (up?`<div class="hint" style="margin:0 0 8px">↑ رُفع التأمين تلقائيًا وفق درجة السمعة بالشبكة (${sc})</div>`:'');})()}
      </div>`;
  }

  if(W.step===4){
    const c=C(W.cust);
    canNext=W.nafathOk;
    body = `<div class="nafath-box">
      <div style="color:var(--primary)">${ic('shield',34,1.8)}</div>
      ${W.nafathOk ? `
        <div style="color:var(--green);margin-top:8px">${ic('checkc',30,2)}</div>
        <h3 style="margin:8px 0 4px">تم التحقق من هوية ${c.name}</h3>

      : W.nafathBusy ? `

        <div class="hint">اطلب من العميل اختيار الرقم التالي في تطبيق نفاذ</div>
        <div class="nafath-num">${W.nnum}</div>
        <div class="spinner"></div>`
      : `
        <h3 style="margin:12px 0 4px">التحقق من هوية العميل</h3>
        <div class="hint">سيصل إشعار لتطبيق نفاذ على جوال ${c.name} (${c.phone})</div>
        <button class="btn btn-primary" style="margin-top:14px" onclick="wzNafath()">${ic('shield',15)} إرسال طلب التحقق</button>`}
    </div>
    <div class="hint" style="margin-top:10px;text-align:center">محاكاة للعرض — الربط الفعلي يتم عبر منصة نفاذ الحكومية</div>`;

      </div>`;
  }

  const foot = `
    ${W.step>1?`<button class="btn btn-ghost" onclick="W.step--;wzPaint()">${ic('arrowL',15)} السابق</button>`:''}
    ${W.step<5
      ? `<button class="btn btn-primary" style="margin-inline-start:auto" ${canNext?'':'disabled'} onclick="W.step++;wzPaint()">التالي</button>`
      : `<button class="btn btn-primary" style="margin-inline-start:auto" id="wzFin" disabled onclick="wzFinish()">${ic('check',15)} إنشاء العقد وتوثيقه</button>`}`;

  openModal(`${mHead('عقد جديد — '+WZ_T[W.step])}<div class="m-b">${wzSteps()}${body}</div><div class="m-f">${foot}</div>`);
  if(W.step===5) wzSig=initSig($('#wzSigC'), ()=>{ $('#wzFin').disabled=false; });

function wzSteps(){ return `<div class="steps">${[1,2,3,4,5].map(i=>`<div class="stp ${W.step>=i?'on':''}"></div>`).join('')}</div>`; }

function wzScanStart(){

  inp.type='file'; inp.accept='image/*'; inp.capture='environment';
  inp.onchange=e=>{ const f=e.target.files[0]; if(!f) return;

  inp.click();
}

      <div class="hint" style="margin:13px 0 4px">البيانات المستخرجة — راجعها وعدّل إن لزم:</div>
      <div class="f2">
        <div class="field-pop"><label class="lbl2">الاسم</label><input class="inp" id="scName" value="${name}"></div>
        <div class="field-pop"><label class="lbl2">رقم الهوية</label><input class="inp" id="scNid" value="${nid}" style="direction:ltr;text-align:end"></div>
      </div>
      <div class="f2">
        <div class="field-pop"><label class="lbl2">رقم الجوال</label><input class="inp" id="scPhone" value="${phone}" style="direction:ltr;text-align:end"></div>
        <div class="field-pop"><label class="lbl2">انتهاء الرخصة</label><input class="inp" id="scLic" value="${lic}" style="direction:ltr;text-align:end"></div>
      </div>
      <div class="hint" style="margin-top:10px">محاكاة لاستخراج البيانات (OCR) — في النسخة الكاملة تُقرأ الحقول فعليًا من صورة الوثيقة.</div>`;
    const foot=$('#scanFoot');
    if(foot) foot.innerHTML=`<button class="btn btn-primary" onclick="wzScanConfirm()">${ic('check',15)} اعتماد وإضافة العميل</button>
      <button class="btn btn-ghost" onclick="wzScanStart()">${ic('clip',14)} إعادة المسح</button>
      <button class="btn btn-ghost" style="margin-inline-start:auto" onclick="wzPaint()">إلغاء</button>`;
  }, 2000);
}
function wzScanConfirm(){
  const n=$('#scName').value.trim(), nid=$('#scNid').value.trim(), p=$('#scPhone').value.trim(), lic=$('#scLic').value.trim();
  if(!n||!p){ toast('الاسم ورقم الجوال مطلوبان', false); return; }
  const mask = nid.length>=6 ? nid.slice(0,4)+'****'+nid.slice(-2) : nid;
  const id='C'+(state.cseq++);
  state.customers.push({id, name:n, phone:p, nid:mask, nafath:false, lic:lic||'سارية', rentals:0, spend:0, net:{r:0,late:0,dmg:0,viol:0,off:0}});
  W.cust=id; W._scan=null;
  wzPaint();
  toast(`تمت إضافة ${n} من مسح الوثيقة`);
}
function wzNafath(){
  W.nafathBusy=true; wzPaint();
  setTimeout(()=>{
    W.nafathBusy=false; W.nafathOk=true;
    C(W.cust).nafath=true;
    wzPaint(); toast('تم التحقق من الهوية عبر نفاذ ✓');
  }, 1800);
}
function wzFinish(){
  const v=V(W.veh), c=C(W.cust), k=wzCalc();
  const id='CT-'+(state.seq++);
  state.contracts.push({id, cust:W.cust, veh:W.veh, from:W.from, days:W.days, daily:v.daily, total:k.sub, status:'active', signed:true, sig:wzSig.data(), nafath:true});
  v.status='rented'; v.renter=W.cust;
  c.rentals++; c.spend+=k.sub;
  state.payments.unshift({date:today(), ref:id, cust:W.cust, method:'مدى', amount:k.sub});
  closeModal(); refreshBadges(); render();
  toast(`تم إنشاء العقد ${id} وتوثيقه بنجاح`);
  setTimeout(()=>openInvoice(id), 450);
}

    plate:{n:$('#avPn').value.trim()||'0000', l:$('#avPl').value.trim()||'أ ب ج'},
    status:'available', odo:+$('#avOd').value||0, daily:+$('#avDl').value,
    fuel:100, branch:$('#avBr').value, renter:null, em:'🚙', insp:[]

  closeModal(); toast(`تمت إضافة ${ar} إلى الأسطول`); nav('vehicles');
}
function openAddCustomer(){

}

function openAddExpense(){

/* ================= GLOBAL SEARCH ================= */
function doSearch(q){
  q=(q||'').trim().toLowerCase();
  const pop=$('#searchPop');
  if(!q){ pop.classList.remove('open'); pop.innerHTML=''; return; }
  const vs = state.vehicles.filter(v=>(v.ar+' '+v.en+' '+v.plate.n).toLowerCase().includes(q)).slice(0,4);
  const cs = state.customers.filter(c=>(c.name+' '+c.phone).toLowerCase().includes(q)).slice(0,4);
  const ts = state.contracts.filter(t=>(t.id+' '+C(t.cust).name+' '+vName(t.veh)).toLowerCase().includes(q)).slice(0,4);
  let h='';
  if(vs.length) h+=`<div class="mhead">السيارات</div>`+vs.map(v=>`
    <div class="mi" onclick="srGo('vehicles', ()=>openVehicle('${v.id}'))"><span style="color:var(--primary)">${ic('car',16)}</span><div><b>${v.em} ${v.ar} ${v.year}</b><span>لوحة ${v.plate.n} · ${VSTAT[v.status].t}</span></div></div>`).join('');
  if(cs.length) h+=`<div class="mhead">العملاء</div>`+cs.map(c=>`
    <div class="mi" onclick="srGo('customers')"><span style="color:#16a34a">${ic('users',16)}</span><div><b>${c.name}</b><span>${c.phone}</span></div></div>`).join('');
  if(ts.length) h+=`<div class="mhead">العقود</div>`+ts.map(t=>`
    <div class="mi" onclick="srGo('contracts', ()=>openContract('${t.id}'))"><span style="color:#d97706">${ic('file',16)}</span><div><b>${t.id} — ${C(t.cust).name}</b><span>${vName(t.veh)} · ${fmt(t.total)} ر.س</span></div></div>`).join('');
  if(!h) h=`<div class="mi"><span style="color:var(--faint)">${ic('search',15)}</span><div><b>لا نتائج</b><span>جرّب اسم سيارة أو عميل أو رقم عقد</span></div></div>`;
  pop.innerHTML=h; pop.classList.add('open');
}
function srGo(view, fn){
  $('#searchPop').classList.remove('open');
  $('#searchInp').value='';
  nav(view);
  if(fn) setTimeout(fn, 120);
}

/* ================= TOPBAR MENUS + INIT ================= */
function fillMenus(){
  $('#notifMenu').innerHTML = `<div class="mhead">الإشعارات</div>` + state.notifications.map(n=>`
    <div class="mi"><span style="color:${n.c}">${ic(n.ic,16)}</span><div><b>${n.t}</b><span>${n.s}</span></div></div>`).join('');
  $('#addMenu').innerHTML = [
    ['file','عقد إيجار جديد','openWizard()','var(--primary)'],
    ['cal','حجز مسبق','openAddBooking()','#16a34a'],
    ['car','سيارة للأسطول','openAddVehicle()','#d97706'],
    ['users','عميل','openAddCustomer()','#8b5cf6'],
    ['receipt','مصروف','openAddExpense()','#ef4444'],
  ].map(([i,t,fn,c])=>`<div class="mi" onclick="document.querySelectorAll('.menu.open').forEach(m=>m.classList.remove('open'));${fn}"><span style="color:${c}">${ic(i,16)}</span><b>${t}</b></div>`).join('');
}
function init(){
  $('#logoIc').innerHTML  = ic('car',19,2.2);
  $('#panelIc').innerHTML = ic('panel',17);
  $('#searchIc').innerHTML= ic('search',15);
  $('#bellIc').innerHTML  = ic('bell',17);
  $('#plusIc').innerHTML  = ic('plus',15,2.6);
  $('#langIc').innerHTML  = ic('lang',15);
  $('#langIc2').innerHTML = ic('lang',13);
  fillMenus();
  $('#searchInp').insertAdjacentHTML('afterend','<span class="kbd">/</span>');
  document.querySelectorAll('.bic').forEach(el=> el.innerHTML = ic(el.dataset.i, el.closest('.bfab')?22:19, el.closest('.bfab')?2.6:2));
  nav('dashboard');
}
document.addEventListener('keydown', e=>{
  const typing=/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName);
  if(e.key==='/' && !typing){ e.preventDefault(); $('#searchInp').focus(); }
  if(e.key==='Escape'){
    $('#searchPop').classList.remove('open');
    if($('#modalRoot').innerHTML) closeModal();
  }
});
init();
</script>
